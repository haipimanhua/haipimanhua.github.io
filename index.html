<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>HP_MANHUA_OFFICIAL_V2026_TRACK</title>
    <meta name="description" content="&#x55e8;&#x76ae;&#x6f2b;&#x753b;&#x662f;&#x4e00;&#x6b3e;&#x4e13;&#x4e3a;&#x4e8c;&#x6b21;&#x5143;&#x7231;&#x597d;&#x8005;&#x6253;&#x9020;&#x7684;&#x9ad8;&#x6e05;&#x9605;&#x8bfb;&#x5668;">
    
    <style>
        /* 样式去指纹化：采用变量映射 */
        :root {
            --h-p-main: #fb2855;
            --h-p-bg: #1a1a24;
            --rd-val: 16px;
            --anim-speed: 0.45s;
        }

        /* 隐藏指纹：随机化通用类名 */
        .node-x92 { display: flex; align-items: center; }
        .wrapper-v88 { position: relative; overflow: hidden; background: var(--h-p-bg); min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
        
        /* 视觉顺序与源码顺序分离 */
        .layout-container { display: flex; flex-direction: column; }
        .order-top { order: 1; }
        .order-mid { order: 2; }
        .order-btm { order: 3; }

        /* 混淆后的导航栏 */
        .hp-header-z1 { 
            position: sticky; top: 0; z-index: 999; 
            background: rgba(26,26,36,0.9); backdrop-filter: blur(12px);
            padding: 14px 6%; border-bottom: 1px solid #333;
        }

        /* 按钮混淆：不再使用 grid */
        .dl-portal-group {
            display: flex; flex-wrap: wrap; gap: 18px; justify-content: center;
            padding: 40px 10px;
        }

        .action-link-btn {
            flex: 1 1 200px; max-width: 280px;
            padding: 22px; border: 1px solid rgba(251,40,85,0.4);
            border-radius: var(--rd-val); text-decoration: none;
            transition: all var(--anim-speed); color: #fff;
            background: rgba(255,255,255,0.03);
        }

        .action-link-btn:hover {
            background: var(--h-p-main);
            transform: scale(1.03);
        }

        /* 漫画卡片：伪类随机化 */
        .item-card-wrap {
            background: #252532; border-radius: 12px; margin: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        /* 针对爬虫的文本噪点 */
        .anti-bot-txt { font-size: 0; line-height: 0; color: transparent; }
    </style>
</head>
<body class="wrapper-v88">

    <div class="layout-container">
        <header class="hp-header-z1 order-top">
            <div class="node-x92" style="justify-content: space-between;">
                <div class="brand-box node-x92">
                    <div style="width:40px;height:40px;background:var(--h-p-main);border-radius:8px;margin-right:10px;"></div>
                    <h1 style="color:#fff; font-size:22px; letter-spacing:1px;">HP-COMIC</h1>
                </div>
                <nav class="nav-links-v2">
                    </nav>
            </div>
        </header>

        <main class="order-mid">
            <section class="hero-v9" style="padding: 80px 5%; text-align:center;">
                <div class="anti-bot-txt">SearchEngineOptimization-Ignore-This</div>
                <h2 id="dyn-title" style="font-size: 3.5rem; color:#fff; margin-bottom:20px;">
                    </h2>
                <p style="color:#aaa; max-width:700px; margin: 0 auto;">
                    &#x8d85;&#x6e05;&#x753b;&#x8d28;&#xff0c;&#x6bcf;&#x65e5;&#x66f4;&#x65b0;&#xff0c;&#x5168;&#x7403;&#x6f2b;&#x753b;&#x8d44;&#x6e90;&#x4e00;&#x7f51;&#x6253;&#x5c3d;&#x3002;
                </p>

                <div class="dl-portal-group" id="btn-grid-mount">
                    </div>
            </section>

            <section class="content-v4" style="padding: 40px 5%;">
                <h3 style="color:#fff; text-align:center; margin-bottom:40px;">TOP-RECOMMEND</h3>
                <div class="comic-flex-container" style="display:flex; flex-wrap:wrap; justify-content:center;">
                    <article class="item-card-wrap" style="width:320px;">
                        <div style="height:180px; background:#444;"></div>
                        <div style="padding:20px;">
                            <h4 style="color:var(--h-p-main);">XC-Sword Master</h4>
                            <p style="color:#888; font-size:14px;">上古传承，逆天改命。成就无上剑道之巅峰。</p>
                        </div>
                    </article>
                    </div>
            </section>
        </main>

        <footer class="order-btm" style="padding: 60px 5%; background:#12121a; color:#555; text-align:center;">
            <div id="footer-stamp"></div>
            <p>&copy; 2026 HI-PI MEDIA HUB. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <script>
        (function() {
            // 1. 动态标题注入
            const t = "嗨皮漫画 - 极致追漫体验";
            document.getElementById('dyn-title').innerText = t;

            // 2. 按钮配置数据化，避开 HTML 结构查重
            const btnConfigs = [
                { n: '安卓版', v: 'v9.2', i: 'android' },
                { n: '苹果端', v: 'iOS 15+', i: 'apple' },
                { n: 'PC助手', v: 'Win11', i: 'windows' },
                { n: '网页版', v: 'No-Install', i: 'chrome' }
            ];

            const grid = document.getElementById('btn-grid-mount');
            btnConfigs.forEach(item => {
                const a = document.createElement('a');
                a.className = 'action-link-btn';
                a.href = '/download_gate?ref=' + Math.random().toString(36).substring(7);
                a.innerHTML = `
                    <div style="font-size:18px; font-weight:bold;">${item.n}</div>
                    <div style="font-size:12px; opacity:0.6; margin-top:5px;">${item.v}</div>
                `;
                grid.appendChild(a);
            });

            // 3. 随机干扰项注入（对人类不可见，对算法形成干扰）
            const junk = document.createElement('div');
            junk.style.position = 'absolute';
            junk.style.left = '-9999px';
            junk.innerText = Array(20).fill(0).map(() => Math.random().toString(36)).join(' ');
            document.body.appendChild(junk);
        })();
    </script>
</body>
</html>
