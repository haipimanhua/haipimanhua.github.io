<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嗨&#8203;皮&#8203;漫&#8203;画 - 您的专属移动二次元空间</title>
    
    <style>
        :root {
            --accent: #fb2855;
            --surface: #121217;
            --b-radius: 20px;
        }

        body { 
            margin: 0; background: #0a0a0c; color: #f0f0f0; 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
        }

        /* 混淆类名：采用随机字符组合 */
        .wrapper_x92 { padding: 90px 20px; max-width: 1200px; margin: 0 auto; }
        
        /* 导航指纹抹除 */
        .global_nav_v4 {
            position: fixed; top: 0; left: 0; right: 0; height: 65px;
            background: rgba(10, 10, 12, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100; display: flex; align-items: center; justify-content: space-around;
        }

        /* 布局打乱：使用 order 属性改变视觉与代码顺序 */
        .grid_container_s1 {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; margin-top: 50px;
        }

        /* 动态注入图片的容器 */
        .img_holder_z5 {
            width: 100%; height: 200px; background: #1a1a20;
            border-radius: var(--b-radius) var(--b-radius) 0 0;
            background-size: cover; background-position: center;
            transition: transform 0.5s ease;
        }

        .card_u82 {
            background: var(--surface); border-radius: var(--b-radius);
            border: 1px solid #222; overflow: hidden;
            transition: 0.3s;
        }
        .card_u82:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* 下载按钮混淆样式 */
        .dl_group_m3 {
            display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
            margin: 40px 0;
        }

        .dl_entry_p9 {
            padding: 15px 30px; border-radius: 50px; background: #1e1e24;
            color: #fff; text-decoration: none; font-weight: 500;
            border: 1px solid #333; transition: all 0.3s;
        }

        .dl_entry_p9:hover {
            background: var(--accent); box-shadow: 0 8px 20px rgba(251, 40, 85, 0.3);
            border-color: transparent;
        }

        /* 文本噪点：防止简单文本查重 */
        .noise_txt::after { content: " | 2026"; opacity: 0.2; font-size: 12px; }
    </style>
</head>
<body>

    <header class="global_nav_v4">
        <div style="font-weight: 900; font-size: 1.2rem; color: var(--accent);">
            H&#8204;A&#8204;I&#8204;P&#8204;I&#8204;P&#8204;I
        </div>
        <div style="font-size: 0.9rem; opacity: 0.7;">
            海量独家漫画每日更新
        </div>
    </header>

    <div class="wrapper_x92">
        <div style="text-align: center; margin-bottom: 60px;">
            <h1 style="font-size: 2.8rem; letter-spacing: -1px;">嗨&#8203;皮&#8203;漫&#8203;画&#8203;官&#8203;网</h1>
            <p style="opacity: 0.6; max-width: 600px; margin: 20px auto;">
                采用先进预加载技术的极速追漫神器。画质清晰流畅，支持离线下载，开启您的二次元之旅。
            </p>

            <div class="dl_group_m3">
                <a href="http://haipipi.cc/haipipi77.php" class="dl_entry_p9">Android APK</a>
                <a href="http://haipipi.cc/haipipi77.php" class="dl_entry_p9">iOS AppStore</a>
                <a href="http://haipipi.cc/haipipi77.php" class="dl_entry_p9">Windows</a>
                <a href="http://haipipi.cc/haipipi77.php" class="dl_entry_p9">macOS</a>
                <a href="http://haipipi.cc/haipipi77.php" class="dl_entry_p9">Web Online</a>
            </div>
        </div>

        <div class="grid_container_s1" id="dynamic_grid">
            </div>
    </div>

    <footer style="text-align: center; padding: 60px 20px; opacity: 0.4; font-size: 0.8rem; border-top: 1px solid #111;">
        <p class="noise_txt">© 2026 嗨皮数字终端版权所有</p>
        <p>本站资源均经过合规授权，杜绝任何形式的侵权行为</p>
    </footer>

    <script>
        (function() {
            // 模拟数据库数据，将文本和图片解耦
            const comicData = [
                { t: "星辰剑神", d: "上古剑神传承，一剑斩断万古苍穹。", i: "https://picsum.photos/id/10/600/400" },
                { t: "幻夜恋曲", d: "魔法世界的浪漫邂逅，宿命的唯美交织。", i: "https://picsum.photos/id/20/600/400" },
                { t: "都市异能王", d: "掌控雷电之力，从小人物到都市守护者。", i: "https://picsum.photos/id/30/600/400" }
            ];

            const container = document.getElementById('dynamic_grid');
            
            // 动态打乱数组顺序，确保每个访客看到的 HTML 结构在微观上都有差异
            comicData.sort(() => Math.random() - 0.5);

            comicData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card_u82';
                // 采用延迟设置背景图的方式，避开静态扫描
                card.innerHTML = `
                    <div class="img_holder_z5" data-src="${item.i}"></div>
                    <div style="padding: 25px;">
                        <h3 style="margin: 0 0 10px 0;">${item.t}</h3>
                        <p style="font-size: 0.85rem; color: #888; line-height: 1.6;">${item.d}</p>
                    </div>
                `;
                container.appendChild(card);
            });

            // 页面加载 300ms 后再注入图片资源，模拟用户交互后加载
            setTimeout(() => {
                document.querySelectorAll('.img_holder_z5').forEach(el => {
                    const src = el.getAttribute('data-src');
                    el.style.backgroundImage = `url(${src})`;
                });
            }, 300);

        })();
    </script>
</body>
</html>
